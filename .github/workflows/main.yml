name: Build PSP Comic Reader

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build EBOOT.PBP
    runs-on: ubuntu-24.04        # ← GLIBC 2.38 → compatibile con pspdev nightly

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Cache PSPSDK ─────────────────────────────────────────────────────────
      - name: Cache PSPSDK
        id: cache-pspsdk
        uses: actions/cache@v4
        with:
          path: /usr/local/pspdev
          key: pspsdk-ubuntu24-nightly-2026

      # ── Dipendenze di sistema ─────────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build wget git \
            libgmp-dev libmpfr-dev libmpc-dev

      # ── Scarica toolchain pspdev pre-compilato ────────────────────────────────
      - name: Install pspdev toolchain
        if: steps.cache-pspsdk.outputs.cache-hit != 'true'
        run: |
          wget -q \
            https://github.com/pspdev/pspdev/releases/latest/download/pspdev-ubuntu-latest-x86_64.tar.gz
          sudo tar -xzf pspdev-ubuntu-latest-x86_64.tar.gz -C /usr/local/
          rm pspdev-ubuntu-latest-x86_64.tar.gz

      # ── Variabili d'ambiente ──────────────────────────────────────────────────
      - name: Configure PSPSDK environment
        run: |
          echo "PSPDEV=/usr/local/pspdev"     >> $GITHUB_ENV
          echo "PSPSDK=/usr/local/pspdev/psp" >> $GITHUB_ENV
          echo "/usr/local/pspdev/bin"         >> $GITHUB_PATH
          echo "/usr/local/pspdev/psp/bin"     >> $GITHUB_PATH

      # ── Librerie vendor (single-header) ───────────────────────────────────────
      - name: Download miniz (ZIP support)
        run: |
          wget -q https://raw.githubusercontent.com/richgel999/miniz/master/miniz.h \
               -O src/libs/miniz/miniz.h
          wget -q https://raw.githubusercontent.com/richgel999/miniz/master/miniz.c \
               -O src/libs/miniz/miniz.c

      - name: Download stb_image (image decoding)
        run: |
          wget -q https://raw.githubusercontent.com/nothings/stb/master/stb_image.h \
               -O src/libs/stb/stb_image.h

      # ── Verifica toolchain ────────────────────────────────────────────────────
      - name: Verify psp-gcc
        run: psp-gcc --version

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Configure (CMake)
        run: |
          # Usa il toolchain incluso nel pspdev se esiste, altrimenti il nostro
          TC="$PSPSDK/lib/cmake/psp-toolchain.cmake"
          [ -f "$TC" ] || TC="${GITHUB_WORKSPACE}/cmake/psp-toolchain.cmake"
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE="$TC" \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      # ── Pacchettizza ──────────────────────────────────────────────────────────
      - name: Stage output
        run: |
          mkdir -p dist/PSPComicReader
          cp build/EBOOT.PBP dist/PSPComicReader/EBOOT.PBP
          cat > dist/PSPComicReader/README.txt << 'EOF'
          PSP Comic Reader
          ================
          Copia la cartella in:  PSP/GAME/PSPComicReader/EBOOT.PBP

          Metti i fumetti (.cbz .cbr .cb7 .cbt .zip .pdf) in:
            ms0:/COMICS/

          Controlli
          ---------
          L/R Trigger   Pagina precedente / successiva
          D-Pad/Analog  Scorri immagine
          Square        Cambia modalita' zoom
          L + R         Adatta allo schermo
          Triangle      Menu
          Circle        Indietro
          Cross         Apri file / Aggiungi segnalibro
          Select        Lista segnalibri
          Start         Mostra/nascondi barra info
          EOF

      - name: Create ZIP
        run: |
          cd dist
          zip -r PSPComicReader.zip PSPComicReader/

      # ── Artifact (ogni build) ─────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PSPComicReader-${{ github.sha }}
          path: dist/PSPComicReader.zip
          retention-days: 14

      # ── Release (solo su tag v*) ──────────────────────────────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: PSP Comic Reader ${{ github.ref_name }}
          files: dist/PSPComicReader.zip
          body: |
            ## PSP Comic Reader ${{ github.ref_name }}

            ### Formati supportati
            CBZ, CBR, CB7, CBT, ZIP, RAR, 7Z, TAR, JPG, PNG, BMP, GIF, WEBP, cartelle

            ### Installazione
            Copia `PSPComicReader/EBOOT.PBP` in `PSP/GAME/PSPComicReader/` sulla Memory Stick.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
