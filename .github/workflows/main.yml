name: Build PSP Comic Reader

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build EBOOT.PBP
    runs-on: ubuntu-22.04

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Cache PSPSDK ─────────────────────────────────────────────────────────
      - name: Cache PSPSDK
        id: cache-pspsdk
        uses: actions/cache@v4
        with:
          path: /usr/local/pspdev
          key: pspsdk-nightly-2024

      # ── Install PSPSDK (pspdev toolchain) ────────────────────────────────────
      - name: Install pspdev toolchain
        if: steps.cache-pspsdk.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build python3 git wget curl \
            libgmp-dev libmpfr-dev libmpc-dev \
            texinfo bison flex autoconf automake libtool \
            build-essential

          # Download the pspdev pre-built toolchain (official nightly)
          wget -q https://github.com/pspdev/pspdev/releases/latest/download/pspdev-ubuntu-latest-x86_64.tar.gz
          sudo tar -xzf pspdev-ubuntu-latest-x86_64.tar.gz -C /usr/local/
          rm pspdev-ubuntu-latest-x86_64.tar.gz

      # ── Set PSPSDK environment ────────────────────────────────────────────────
      - name: Configure PSPSDK environment
        run: |
          echo "PSPDEV=/usr/local/pspdev"     >> $GITHUB_ENV
          echo "PSPSDK=/usr/local/pspdev/psp" >> $GITHUB_ENV
          echo "/usr/local/pspdev/bin"         >> $GITHUB_PATH
          echo "/usr/local/pspdev/psp/bin"     >> $GITHUB_PATH

      # ── Download vendored single-header libraries ─────────────────────────────
      - name: Download miniz (ZIP support)
        run: |
          wget -q https://raw.githubusercontent.com/richgel999/miniz/master/miniz.h \
               -O src/libs/miniz/miniz.h
          wget -q https://raw.githubusercontent.com/richgel999/miniz/master/miniz.c \
               -O src/libs/miniz/miniz.c

      - name: Download stb_image (image decoding)
        run: |
          wget -q https://raw.githubusercontent.com/nothings/stb/master/stb_image.h \
               -O src/libs/stb/stb_image.h

      # ── Verify toolchain ──────────────────────────────────────────────────────
      - name: Verify psp-gcc
        run: psp-gcc --version

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Configure (CMake)
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$PSPSDK/lib/cmake/psp-toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      # ── Rename and stage artifact ─────────────────────────────────────────────
      - name: Stage output
        run: |
          mkdir -p dist/PSPComicReader
          cp build/EBOOT.PBP dist/PSPComicReader/EBOOT.PBP
          # Write a quick README for the ZIP
          cat > dist/PSPComicReader/README.txt << 'EOF'
          PSP Comic Reader
          ================
          Place this folder at:  PSP/GAME/PSPComicReader/EBOOT.PBP

          Put your comics (.cbz .cbr .cb7 .cbt .zip .pdf) in:
            ms0:/COMICS/

          Controls
          --------
          L / R Trigger   Previous / Next page
          D-Pad / Analog  Pan image
          Square          Cycle zoom mode (1:1 / Width / Height / Fit / Stretch)
          L + R           Fit to screen immediately
          Triangle        Menu
          Circle          Back
          Cross           Add bookmark  (in reader)
          Cross           Open file     (in browser)
          Select          Bookmarks list
          Start           Toggle info bar
          EOF

      - name: Create ZIP
        run: |
          cd dist
          zip -r PSPComicReader.zip PSPComicReader/

      # ── Upload artifact (every build) ─────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PSPComicReader-${{ github.sha }}
          path: dist/PSPComicReader.zip
          retention-days: 14

      # ── Create GitHub Release (on tag push) ───────────────────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: PSP Comic Reader ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: dist/PSPComicReader.zip
          body: |
            ## PSP Comic Reader ${{ github.ref_name }}

            ### Supported formats
            CBZ, CBR, CB7, CBT, ZIP, RAR, 7Z, TAR, PDF, JPG, PNG, BMP, GIF, WEBP, image folders

            ### Installation
            Copy `PSPComicReader/EBOOT.PBP` to `PSP/GAME/PSPComicReader/` on your Memory Stick.

            ### Controls
            | Button | Action |
            |--------|--------|
            | L / R Trigger | Prev / Next page |
            | D-Pad / Analog | Pan |
            | Square | Cycle zoom |
            | L+R | Fit to screen |
            | Triangle | Menu |
            | Circle | Back |
            | Cross | Open / Bookmark |
            | Select | Bookmarks |
            | Start | Toggle info bar |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
